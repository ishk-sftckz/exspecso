<svg width="600" height="200" viewBox="0 0 600 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Deep Espresso Background -->
  <rect width="600" height="200" rx="32" fill="#1E1511"/>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:ital,wght@1,900&amp;display=swap');

    .logotype {
      font-family: 'Outfit', system-ui, sans-serif;
      font-weight: 900;
      font-style: italic;
      font-size: 116px;
      letter-spacing: -6px;
    }

    /* Caramel Crema for the execution highlight running through the middle */
    .highlight { fill: #D5A770; }
    /* Latte Foam for the base text */
    .base { fill: #F4EEDD; }
  </style>

  <!-- Architectural Background Grids (Mocha Line) -->
  <g stroke="#8C5A35" stroke-opacity="0.25" stroke-width="2">
    <path d="M 0 40 L 600 40 M 0 160 L 600 160"/>
    <path d="M 80 0 L 80 200 M 520 0 L 520 200"/>
    <path d="M 75 100 L 85 100 M 515 100 L 525 100"/>
    <path d="M 300 35 L 300 45 M 300 155 L 300 165"/>
  </g>

  <!-- Central Integrated Logotype -->
  <!-- "exspecso" written completely continuously, no spaces, using color as the separator -->
  <g transform="translate(300, 140)">
    <text x="0" y="0" class="logotype" text-anchor="middle">
      <tspan class="base">ex</tspan><tspan class="highlight">spec</tspan><tspan class="base">so</tspan>
    </text>
  </g>

  <!-- Spec / Blueprint Drafting Nodes & Brackets framing the word -->
  <g stroke="#8C5A35" stroke-width="6" fill="none" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Top left bracket over "e" -->
    <path d="M 230 40 L 120 40 L 120 70" />

    <!-- Bottom right bracket under "o" -->
    <path d="M 370 160 L 485 160 L 485 130" />
  </g>

  <!-- Execution Node Drops (Energy dots) -->
  <circle cx="120" cy="40" r="5" fill="#D5A770" />
  <circle cx="485" cy="160" r="5" fill="#D5A770" />

</svg>
